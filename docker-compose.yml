services:
  ipmijava:
    build: .
    image: ipmijava:latest
    container_name: ipmijava
    # On Linux: network_mode: host gives nmap + IPMI full network access.
    # On Docker Desktop (macOS/Windows): comment out network_mode and
    # use the ports block below instead.
    # network_mode: host   # Linux only — not supported on Docker Desktop (Win/Mac)
    ports:
      - "9193:9193"
      - "6080-6089:6080-6089"   # websockify HTML5 KVM sessions
      - "6090-6099:6090-6099"   # TCP proxy Java iKVM sessions
    environment:
      SECRET_KEY: "12c658c55b1d42896ce9794bb17dd9de90e544a14f7f11902e109c5e67a6ef1d"
    volumes:
      - ./config:/config
    restart: unless-stopped
